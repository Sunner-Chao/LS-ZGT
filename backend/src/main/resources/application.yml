server:
  port: 8080

spring:
  application:
    name: luanshu-agent-backend
  main:
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
  webflux:
    static-path-pattern: /static/**
  resources:
    static-locations: classpath:/static/,classpath:/public/
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  security:
    user:
      name: admin
      password: admin

# 应用配置
app:
  # 知识库配置
  knowledge-base:
    # 可通过环境变量 KB_PATH 覆盖，便于本地直跑与 Docker 一致
    path: ${KB_PATH:/app/knowledge_base}
  
  # Milvus 配置
  milvus:
    host: milvus-standalone
    port: 19530
    username: root
    password: milvus
    database: default
    # 性能优化配置
    connection-timeout: 5000  # 连接超时5秒
    search-timeout: 10000     # 搜索超时10秒
    max-retry: 2              # 最大重试次数2次
    retry-interval: 500       # 重试间隔500ms
  
  # JWT 配置
  jwt:
    secret: ${JWT_SECRET:your-super-secret-jwt-key-that-is-at-least-256-bits-long-for-hmac-sha256}
    expiration: 604800000 # 7天
  
  # PDF 解析配置（Docling 为主，VLM OCR 为辅）
  pdf:
    extract:
      kit:
        url: http://pdf-extract-kit:8000/api/parse
        enabled: false  # 已由 Docling 替代，默认关闭
        timeout: 1800  # 1800秒超时，适应超大型PDF文件

  # Docling 文档解析配置（主力解析器）
  docling:
    url: ${DOCLING_URL:http://docling-service:8001}
    enabled: ${DOCLING_ENABLED:true}
    timeout: 180  # 180秒超时

  # VLM OCR 配置（用于扫描版 PDF 和图片文件的视觉识别）
  # VLM 比 Tesseract 更擅长：扫描件、手写体、印章、复杂图表
  vlm:
    ocr:
      # llama-chat 服务的 VLM 端点（宿主机访问用 host.docker.internal）
      url: ${VLM_OCR_URL:http://host.docker.internal:8081}
      enabled: ${VLM_OCR_ENABLED:true}
      timeout: 120       # VLM OCR 单张图片超时（秒）
      max-image-dimension: 2048  # 最大图片边长（像素），超过自动缩放

  # Tesseract OCR 配置（VLM OCR 的降级兜底方案）
  tesseract:
    datapath: /usr/local/share/tessdata
    language: chi_sim+eng
  
  # LLM 配置（统一接口：本地 llama.cpp + 云端 API）
  llm:
    # 提供方：local（llama.cpp）或 cloud（OpenAI/Claude）
    provider: ${LLM_PROVIDER:local}
    # 本地 llama.cpp 对话服务地址
    local-url: ${LLM_LOCAL_URL:http://llama-chat:8080}
    # Embedding 服务地址（独立的向量模型服务）
    embedding-url: ${LLM_EMBEDDING_URL:http://llama-embedding:8080}
    # 云端提供方：openai 或 claude
    cloud-provider: ${LLM_CLOUD_PROVIDER:openai}
    # 云端 API Key（可选）
    cloud-api-key: ${LLM_CLOUD_API_KEY:}
    # 云端 API Base URL（可选，用于自定义端点）
    cloud-base-url: ${LLM_CLOUD_BASE_URL:https://api.openai.com/v1}
    # 对话模型名称
    chat-model: ${LLM_CHAT_MODEL:deepseek-r1:14b}
    # 向量模型名称（本地 llama.cpp）
    embedding-model: ${LLM_EMBEDDING_MODEL:nomic-embed-text}
    # 生成参数
    temperature: 0.7
    max-tokens: 2048
  
  
  # CAD 解析配置
  cad-parser:
    url: ${CAD_PARSER_URL:http://cad-parser:5001}
  
  # BIM 解析配置
  bim-parser:
    url: ${BIM_PARSER_URL:http://bim-parser:5002}
  
  # 性能优化配置
  performance:
    max-search-results: 20     # 最大搜索结果数
    max-context-length: 4000  # 最大上下文长度
    enable-caching: true      # 启用缓存
    cache-ttl: 300           # 缓存5分钟
  
  # 租户配置（多租户支持）
  tenant:
    default-tenant-id: default  # 默认租户ID
    # 存储模式：server（服务器存储）或 local（本地存储）
    # 通过环境变量 STORAGE_MODE 控制，便于不同部署形态复用同一套镜像。
    storage-mode: ${STORAGE_MODE:local}
    default-kb-path: /app/default_kb  # 默认知识库路径（镜像内置，可选）
    # 可通过环境变量 TENANT_KB_PATH 覆盖，保证本地/容器路径一致
    tenant-kb-path: ${TENANT_KB_PATH:/data/knowledge_base/tenants}  # 租户知识库路径
    enable-license-check: false  # 是否启用许可证校验
    license-key: ""              # 许可证密钥

logging:
  level:
    com.luanshuai.agent: DEBUG
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.springframework.boot: INFO
    io.netty: WARN
    io.milvus: WARN
    io.milvus.client: WARN
    io.milvus.grpc: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} | %msg%n"
    # 降低 Milvus 客户端库日志噪音（已在 logging.level 中设置）
    # 禁止 Apache POI 的 WARN/堆栈打印（OLE 对象等提示）
logging.level.org.apache.poi: ERROR
logging.level.org.apache.poi.hwpf: ERROR
logging.level.org.apache.poi.hwpf.converter: ERROR

