# Nginx 全局事件配置：控制 worker 连接等
events {
    # 单个 worker 进程允许的最大并发连接数（按需调整，取决于系统资源）
    worker_connections 1024;
}

# HTTP 全局配置
http {
    # 引入 MIME 类型映射文件（识别文件类型用于设置 Content-Type）
    include       /etc/nginx/mime.types;
    # 默认的 MIME 类型（当无法识别时使用）
    default_type  application/octet-stream;

    # 自定义访问日志格式：记录客户端地址、时间、请求、响应状态、UA 等信息
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # 访问日志路径及使用的日志格式
    access_log /var/log/nginx/access.log main;
    # 错误日志路径（默认级别 info，可在生产环境根据需要调整为 warn 或 error）
    error_log /var/log/nginx/error.log;

    # 性能相关基础配置：尽量在高并发场景优化 IO 与连接处理
    sendfile on;              # 使用 sendfile 提高静态文件传输效率
    tcp_nopush on;            # 优化 sendfile 的包发送行为
    tcp_nodelay on;           # 减少发送延迟
    keepalive_timeout 65;     # keepalive 持续时间，单位秒
    types_hash_max_size 2048; # 缓存 MIME 类型映射的哈希表大小
    client_max_body_size 100M;# 单个请求允许的最大 body 大小（例如文件上传）

    # Gzip 压缩设置：减小传输体积，提升加载速度
    gzip on;
    gzip_vary on;             # 允许根据客户端 Accept-Encoding 响应不同压缩
    gzip_min_length 1024;     # 仅对超过该大小的响应进行压缩
    gzip_proxied any;         # 对代理请求也进行压缩
    gzip_comp_level 6;        # 压缩等级（1-9），6 为较好折中
    # 支持压缩的 MIME 类型列表
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ------------------
    # HTTP -> HTTPS 重定向（将所有 HTTP 请求统一跳转到 HTTPS）
    # ------------------
    server {
        listen 80; # 监听 80 端口（HTTP）
        # 根据部署替换为你真实域名（支持多个 server_name）
        server_name your-domain.com www.your-domain.com;
        # 返回 301 永久重定向到 HTTPS（保留 host 与路径）
        return 301 https://$server_name$request_uri;
    }

    # ------------------
    # HTTPS 主站配置
    # ------------------
    server {
        listen 443 ssl http2; # 启用 TLS 与 HTTP/2
        server_name your-domain.com www.your-domain.com;

        # SSL 证书（替换为实际路径）
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        # 推荐仅启用安全的协议版本
        ssl_protocols TLSv1.2 TLSv1.3;
        # 推荐的密码套件（可按需扩展或使用更严格的列表）
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        # SSL 会话缓存，提升复用性能
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 添加安全相关 HTTP 头，提升浏览器安全策略
        add_header X-Frame-Options DENY; # 防止 clickjacking
        add_header X-Content-Type-Options nosniff; # 禁止 MIME 类型嗅探
        add_header X-XSS-Protection "1; mode=block"; # 启用浏览器 XSS 防护（兼容旧浏览器）
        # HSTS：告知浏览器未来只使用 HTTPS（上生产前确认是否需要 includeSubDomains）
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ------------------
        # 前端静态文件路由（单页应用）
        # ------------------
        location / {
            # 将请求代理到前端服务（通常是一个静态文件服务器或 dev server）
            proxy_pass http://frontend;
            # 保留客户端原始 Host 与客户端 IP，可用于后端日志或基于 Host 的逻辑
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 单页应用（Vue Router history 模式）兼容：若找不到文件，则返回 index.html
            try_files $uri $uri/ /index.html;
        }

        # ------------------
        # API 代理到后端服务
        # ------------------
        location /api/ {
            # 将以 /api/ 开头的请求转发给后端服务（注意目标路径末尾的 / 与后端匹配）
            proxy_pass http://backend:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 代理超时设置（根据后端业务复杂度调整）
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # 支持大文件上传（与上方 client_max_body_size 保持一致或更大）
            client_max_body_size 100M;
        }

        # ------------------
        # 静态资源缓存策略
        # ------------------
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            # 静态资源直接由前端服务处理
            proxy_pass http://frontend;
            # 对静态资源设置长期缓存（1 年）并标记为 immutable，减少重复请求
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
        }

        # ------------------
        # 健康检查端点（用于容器/负载均衡健康探测）
        # ------------------
        location /health {
            access_log off; # 健康检查不写访问日志以减少噪音
            add_header Content-Type text/plain; # 明确响应类型
            return 200 "healthy\n"; # 返回 200 表示服务健康
        }
    }
}


